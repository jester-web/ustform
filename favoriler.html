  <script src="js/products.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Main.js'deki render fonksiyonu kullanılarak sadece favoriler çizilecek
      const favoriler = JSON.parse(localStorage.getItem('favoriler')) || [];
      const favoriUrunler = typeof urunleriGetir === 'function' ? urunleriGetir().filter(u => favoriler.includes(u.id)) : [];

      if (favoriler.length === 0 || favoriUrunler.length === 0) {
        document.getElementById('favoriBosMesaj').style.display = 'block';
      } else {
        if (typeof renderUrunler === 'function') {
          renderUrunler('favoriUrunListesi', favoriUrunler);
        }
      }
    });
  </script>
