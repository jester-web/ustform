<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kayıt Ol — ÜSTFORM</title>
  <meta name="description" content="Üstform'a kayıt olun." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="icon" type="image/png" href="images/ustform.png">
</head>

<body>

  <!-- ── NAVİGASYON ── -->
  <nav class="nav mega-nav">
        <ul class="nav-links nav-left" id="navLinksLeft">
      <li class="mega-hover" data-mega="erkek"><a href="urunler.html?kategori=erkek">ERKEK</a></li>
      <li class="mega-hover" data-mega="kadin"><a href="urunler.html?kategori=kadin">KADIN</a></li>
      <li><a href="hakkinda.html">HAKKINDA</a></li>
      <li><a href="iletisim.html">İLETİŞİM</a></li>
    </ul>

    <a href="index.html" class="nav-logo">
      <img src="images/logo.png" alt="Logo" class="nav-logo-img">
    </a>

    <ul class="nav-links nav-right" id="navLinksRight">
      <li class="nav-ikonlar">
        <a href="#" id="aramaToggle"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="giris.html" id="hesabimLinkKaan">Kaan</a>
        <a href="#" class="nav-sepet" id="offcanvasSepetBtn"><i class="fa-solid fa-box"></i> <span id="sepetSayac"
            style="font-size:0.75rem;">0</span></a>
      </li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menüyü aç/kapa">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mega Menu -->
  <div class="mega-menu" id="megaMenu">
    <div class="mega-menu-ic" id="megaMenuIcerik"></div>
  </div>

  <!-- ── İÇERİK ── -->
  <div class="auth-bolum">
    <div class="auth-kutu">
      <h2>Kayıt Ol</h2>
      <p>Yeni bir hesap oluşturarak avantajlardan yararlanın.</p>
      <form id="kayitForm">
        <div class="form-grup">
          <label for="ad">Ad Soyad</label>
          <input type="text" id="ad" required placeholder="Adınız Soyadınız">
        </div>
        <div class="form-grup">
          <label for="email">E-posta Adresi</label>
          <input type="email" id="email" required placeholder="ornek@eposta.com">
        </div>
        <div class="form-grup">
          <label for="sifre">Şifre</label>
          <input type="password" id="sifre" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-auth">Kayıt Ol <i class="fa-solid fa-user-plus"></i></button>
      </form>
      <div class="auth-link">
        Zaten hesabınız var mı? <a href="giris.html">Giriş Yap</a>
      </div>
    </div>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <div class="footer-alt" style="justify-content: center;">
      <span>&copy; 2026 Üstform. Tüm hakları saklıdır.</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const aktif = JSON.parse(localStorage.getItem('aktifKullanici'));
      if (aktif) {
        window.location.href = 'profil.html';
      }
    });

    document.getElementById('kayitForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const ad = document.getElementById('ad').value;
      const email = document.getElementById('email').value;
      const sifre = document.getElementById('sifre').value;

      const kullanicilar = JSON.parse(localStorage.getItem('kullanicilar')) || [];

      if (kullanicilar.find(k => k.email === email)) {
        alert('Bu e-posta adresi zaten kayıtlı!');
        return;
      }

      const yeniKullanici = { ad, email, sifre };
      kullanicilar.push(yeniKullanici);
      localStorage.setItem('kullanicilar', JSON.stringify(kullanicilar));

      // Otomatik giriş yap
      localStorage.setItem('aktifKullanici', JSON.stringify(yeniKullanici));
      window.location.href = 'index.html';
    });
  </script>
</body>

</html>
