<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Güvenli Ödeme — ÜSTFORM</title>
  <meta name="description" content="Siparişinizi tamamlayın." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="js/speed-insights.js" defer></script>
  <style>
    .odeme-kutu {
      background: var(--gri-1);
      border: 1px solid var(--yari-beyaz);
      border-radius: 8px;
      padding: 30px;
      margin-bottom: 20px;
    }

    .odeme-kutu h3 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--yari-beyaz);
      padding-bottom: 10px;
    }
  </style>
  <link rel="icon" type="image/png" href="images/ustform.png">
</head>

<body>

  <!-- ── NAVİGASYON ── -->
  <nav class="nav mega-nav">
        <ul class="nav-links nav-left" id="navLinksLeft">
      <li class="mega-hover" data-mega="erkek"><a href="urunler.html?kategori=erkek">ERKEK</a></li>
      <li class="mega-hover" data-mega="kadin"><a href="urunler.html?kategori=kadin">KADIN</a></li>
      <li><a href="hakkinda.html">HAKKINDA</a></li>
      <li><a href="iletisim.html">İLETİŞİM</a></li>
    </ul>

    <a href="index.html" class="nav-logo">
      <img src="images/logo.png" alt="Logo" class="nav-logo-img">
    </a>

    <ul class="nav-links nav-right" id="navLinksRight">
      <li class="nav-ikonlar">
        <a href="#" id="aramaToggle"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="giris.html" id="hesabimLinkKaan">Kaan</a>
        <a href="#" class="nav-sepet" id="offcanvasSepetBtn"><i class="fa-solid fa-box"></i> <span id="sepetSayac"
            style="font-size:0.75rem;">0</span></a>
      </li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Menüyü aç/kapa">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mega Menu -->
  <div class="mega-menu" id="megaMenu">
    <div class="mega-menu-ic" id="megaMenuIcerik"></div>
  </div>

  <!-- Mega Menu -->
  <div class="mega-menu" id="megaMenu">
    <div class="mega-menu-ic" id="megaMenuIcerik"></div>
  </div>

  <!-- ── İÇERİK ── -->
  <div class="sepet-bolum">
    <form id="odemeForm">
      <div class="sepet-grid">

        <div class="odeme-sol">
          <div class="odeme-kutu">
            <h3>İletişim & Adres Bilgileri</h3>
            <div class="form-2kolon">
              <div class="form-grup">
                <label>Ad</label>
                <input type="text" required placeholder="Adınız" id="odemeAd">
              </div>
              <div class="form-grup">
                <label>Soyad</label>
                <input type="text" required placeholder="Soyadınız">
              </div>
            </div>
            <div class="form-grup">
              <label>Telefon</label>
              <input type="tel" id="odemeTelefon" required placeholder="05XX XXX XX XX">
            </div>
            <div class="form-grup">
              <label>Teslimat Adresi</label>
              <textarea id="odemeAdres" required placeholder="Açık adresiniz..."></textarea>
            </div>
            <div class="form-grup">
              <label>Şehir</label>
              <input type="text" id="odemeSehir" required placeholder="İl">
            </div>
          </div>

          <div class="odeme-kutu">
            <h3>Kart Bilgileri</h3>
            <div class="form-grup">
              <label>Kart Üzerindeki İsim</label>
              <input type="text" id="odemeKartIsim" name="ccname" autocomplete="cc-name" required placeholder="İsim Soyisim">
            </div>
            <div class="form-grup">
              <label>Kart Numarası</label>
              <input type="text" id="odemeKartNo" name="cardnumber" autocomplete="cc-number" required placeholder="XXXX XXXX XXXX XXXX" maxlength="19">
            </div>
            <div class="form-2kolon">
              <div class="form-grup">
                <label>Son Kullanma (AA/YY)</label>
                <input type="text" id="odemeSonKullanma" name="cc-exp" autocomplete="cc-exp" required placeholder="12/25" maxlength="5">
              </div>
              <div class="form-grup">
                <label>CVV</label>
                <input type="text" id="odemeCvv" name="cvc" autocomplete="cc-csc" required placeholder="123" maxlength="3">
              </div>
            </div>
          </div>
        </div>

        <div class="siparis-ozeti">
          <h3>Ödenecek Tutar</h3>
          <div class="ozet-satir">
            <span>Ara Toplam</span>
            <span id="odemeAraToplam">0₺</span>
          </div>
          <div class="ozet-satir">
            <span>Kargo</span>
            <span id="odemeKargo">0₺</span>
          </div>
          <div class="ozet-satir toplam">
            <span>Genel Toplam</span>
            <span id="odemeToplam">0₺</span>
          </div>
          <p style="font-size: 0.8rem; color: var(--gri-3); margin-top: 20px;">
            <i class="fa-solid fa-lock" style="color: #4caf50;"></i> 256-bit SSL sertifikası ile ödemeniz güvendedir.
          </p>
          <button type="submit" class="btn btn-birincil"
            style="width: 100%; justify-content: center; margin-top: 20px;">Siparişi Tamamla</button>
        </div>

      </div>
    </form>
  </div>

  <!-- ── FOOTER ── -->
  <footer class="footer">
    <div class="footer-alt" style="justify-content: center;">
      <span>&copy; 2026 Üstform. Tüm hakları saklıdır.</span>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Aktif kullanıcı varsa isim doldur, yoksa giriş sayfasına yönlendir
      const aktifKullanici = JSON.parse(localStorage.getItem('aktifKullanici'));
      if (!aktifKullanici) {
        if (window.showToast) window.showToast('Ödeme yapmak için giriş yapmalısınız!');
        setTimeout(() => { window.location.href = 'giris.html'; }, 1200);
        return;
      }
      if (document.getElementById('odemeAd')) {
        document.getElementById('odemeAd').value = aktifKullanici.ad;
      }

      // Toplamı hesapla
      const sepet = JSON.parse(localStorage.getItem('ustform_sepet')) || [];
      if (sepet.length === 0) {
        alert("Sepetiniz boş! Alışverişe yönlendiriliyorsunuz.");
        window.location.href = "urunler.html";
      }

      let toplam = 0;
      sepet.forEach(urun => {
        toplam += urun.fiyat * urun.adet;
      });
      let kargo = toplam > 500 ? 0 : 50;
      
      if(document.getElementById('odemeAraToplam')) {
          document.getElementById('odemeAraToplam').innerText = `${toplam}₺`;
      }
      if(document.getElementById('odemeKargo')) {
          document.getElementById('odemeKargo').innerText = kargo === 0 ? 'Ücretsiz' : `${kargo}₺`;
      }
      
      let indirimTutari = 0;
      const uygulananPromosyon = JSON.parse(localStorage.getItem('uygulananPromosyon'));
      
      if (uygulananPromosyon) {
        if (uygulananPromosyon.tip === 'yuzde') indirimTutari = Math.floor(toplam * (uygulananPromosyon.miktar / 100));
        else indirimTutari = uygulananPromosyon.miktar;
        if (indirimTutari > toplam) indirimTutari = toplam;
        
        // Ekrana indirim satırı ekle
        const siparisOzeti = document.querySelector('.siparis-ozeti');
        const indirimDiv = document.createElement('div');
        indirimDiv.className = 'ozet-satir';
        indirimDiv.innerHTML = `<span>İndirim (${uygulananPromosyon.kod})</span> <span style="color:var(--vurgu);">-${indirimTutari}₺</span>`;
        siparisOzeti.insertBefore(indirimDiv, siparisOzeti.querySelector('.toplam'));
      }
      
      const nihaiToplam = Math.max(0, toplam + kargo - indirimTutari);
      document.getElementById('odemeToplam').innerText = `${nihaiToplam}₺`;

      // ── FORM VALIDATION & FORMATTING ──
      const telefonInput = document.getElementById('odemeTelefon');
      if(telefonInput) {
        telefonInput.addEventListener('input', function(e) {
          let val = this.value.replace(/\D/g, ''); // Sadece rakam
          this.value = val;
        });
      }

      const kartNoInput = document.getElementById('odemeKartNo');
      if(kartNoInput) {
        kartNoInput.addEventListener('input', function(e) {
          let val = this.value.replace(/\D/g, '');
          let formatted = val.match(/.{1,4}/g);
          this.value = formatted ? formatted.join(' ') : val;
        });
      }

      const sktInput = document.getElementById('odemeSonKullanma');
      if(sktInput) {
        sktInput.addEventListener('input', function(e) {
          let val = this.value.replace(/\D/g, '');
          if (val.length > 2) {
            val = val.substring(0,2) + '/' + val.substring(2,4);
          }
          this.value = val;
        });
      }

      const cvvInput = document.getElementById('odemeCvv');
      if(cvvInput) {
        cvvInput.addEventListener('input', function(e) {
          this.value = this.value.replace(/\D/g, '').substring(0,3);
        });
      }

      // Form Submit
      document.getElementById('odemeForm').addEventListener('submit', function (e) {
        e.preventDefault();

        // Basit doğrulamalar
        if(kartNoInput.value.replace(/\s/g, '').length !== 16) {
          alert('Lütfen 16 haneli geçerli bir kart numarası giriniz.');
          return;
        }
        if(sktInput.value.length !== 5) {
          alert('Lütfen geçerli bir Son Kullanma Tarihi (AA/YY) giriniz.');
          return;
        }
        if(cvvInput.value.length !== 3) {
          alert('Lütfen 3 haneli CVV kodunu giriniz.');
          return;
        }

        const btn = this.querySelector('button[type="submit"]');
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> İşleniyor...';
        btn.disabled = true;

        setTimeout(() => {
          // Siparişi profil sayfasına aktarma
          const siparisler = JSON.parse(localStorage.getItem('siparisler')) || [];
          const aktifKullanici = JSON.parse(localStorage.getItem('aktifKullanici')) || { email: 'misafir@misafir.com' };

          siparisler.push({
            id: Math.floor(Math.random() * 100000),
            kullaniciEmail: aktifKullanici.email,
            kullaniciAd: document.getElementById('odemeAd').value || 'Misafir',
            telefon: document.getElementById('odemeTelefon').value,
            adres: document.getElementById('odemeAdres').value,
            sehir: document.getElementById('odemeSehir').value,
            sepet: sepet,
            toplamOdeme: nihaiToplam,
            kullanilanPromosyon: uygulananPromosyon ? { kod: uygulananPromosyon.kod, indirimTutari } : null,
            durum: 'Sipariş Alındı',
            tarih: new Date().toISOString()
          });
          localStorage.setItem('siparisler', JSON.stringify(siparisler));

          localStorage.removeItem('ustform_sepet'); // Sepeti temizle
          localStorage.removeItem('uygulananPromosyon'); // Promosyonu temizle
          alert("Siparişiniz başarıyla alındı! Teşekkür ederiz.");
          window.location.href = "profil.html";
        }, 2000);
      });
    });
  </script>
</body>

</html>
